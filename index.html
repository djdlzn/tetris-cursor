<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>테트리스</h1>
    </header>

    <main class="game-area">
      <section class="board-section">
        <div id="game-board" aria-label="테트리스 게임 보드"></div>
      </section>

      <aside class="side-panel">
        <div class="score-box">
          <h2>점수</h2>
          <p id="score" class="score-value" aria-live="polite">0</p>
          <p id="game-status" class="game-status hidden" role="status"></p>
        </div>

        <div class="controls">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button" disabled>재시작</button>
        </div>

        <div class="help-box">
          <h2>조작법</h2>
          <p class="help-note">게임 시작 후 키보드로 조작합니다.</p>
          <ul>
            <li><kbd>←</kbd> 왼쪽 이동</li>
            <li><kbd>→</kbd> 오른쪽 이동</li>
            <li><kbd>↓</kbd> 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> 회전</li>
            <li><kbd>Space</kbd> 즉시 낙하 (hard drop)</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
